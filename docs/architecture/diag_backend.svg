<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Client -->
  <rect x="240" y="20" width="200" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="42" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">React client</text>

  <line x1="280" y1="64" x2="160" y2="108" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="340" y1="64" x2="340" y2="108" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="400" y1="64" x2="520" y2="108" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 3 routes -->
  <rect x="60" y="108" width="165" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="142" y="130" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">CRUD routes</text>
  <text x="142" y="149" text-anchor="middle" font-size="11" fill="#0F6E56">projects + files</text>

  <rect x="255" y="108" width="170" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="130" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">POST /agent</text>
  <text x="340" y="149" text-anchor="middle" font-size="11" fill="#0F6E56">SSE stream</text>

  <rect x="455" y="108" width="165" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="537" y="130" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">POST /execute</text>
  <text x="537" y="149" text-anchor="middle" font-size="11" fill="#0F6E56">stateless run</text>

  <!-- CRUD → DB (vertical line on far left) -->
  <line x1="142" y1="164" x2="142" y2="380" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Agent expands -->
  <line x1="340" y1="164" x2="340" y2="210" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="195" y="210" width="290" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="232" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">Agent loop</text>
  <text x="340" y="251" text-anchor="middle" font-size="11" fill="#993C1D">build context → LLM → handle tools</text>

  <!-- tool fan-out -->
  <line x1="270" y1="266" x2="190" y2="306" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="340" y1="266" x2="340" y2="306" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="410" y1="266" x2="455" y2="306" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="100" y="306" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="160" y="324" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">read_file</text>
  <text x="160" y="340" text-anchor="middle" font-size="11" fill="#5F5E5A">from DB</text>

  <rect x="270" y="306" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="330" y="324" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">write_file</text>
  <text x="330" y="340" text-anchor="middle" font-size="11" fill="#5F5E5A">DB + snapshot</text>

  <rect x="408" y="306" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="478" y="324" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">exec_command</text>
  <text x="478" y="340" text-anchor="middle" font-size="11" fill="#5F5E5A">allowlist only</text>

  <!-- write_file → DB -->
  <line x1="300" y1="350" x2="200" y2="390" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- execute route expands -->
  <line x1="537" y1="164" x2="537" y2="406" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- DB node -->
  <rect x="60" y="380" width="130" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="125" y="398" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">Bun.sqlite</text>
  <text x="125" y="414" text-anchor="middle" font-size="11" fill="#185FA5">Drizzle ORM</text>

  <!-- Execution router -->
  <rect x="190" y="406" width="390" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="385" y="424" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">Execution router</text>
  <text x="385" y="440" text-anchor="middle" font-size="11" fill="#854F0B">language check → pick engine</text>

  <line x1="310" y1="450" x2="240" y2="484" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="460" y1="450" x2="510" y2="484" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="130" y="484" width="155" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="207" y="502" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">Bun.spawn</text>
  <text x="207" y="518" text-anchor="middle" font-size="11" fill="#5F5E5A">JS / TS only</text>

  <rect x="400" y="484" width="155" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="477" y="502" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">Piston API</text>
  <text x="477" y="518" text-anchor="middle" font-size="11" fill="#5F5E5A">Python, Rust, Go…</text>
</svg>