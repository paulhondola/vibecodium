<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">

  <!-- app shell -->
  <rect x="30" y="20" width="620" height="420" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="340" y="42" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">VibeCodium — app shell</text>

  <!-- left: file explorer -->
  <rect x="50" y="56" width="140" height="190" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="120" y="76" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">File explorer</text>
  <text x="120" y="96" text-anchor="middle" font-size="11" fill="#534AB7">flat list</text>
  <text x="120" y="112" text-anchor="middle" font-size="11" fill="#534AB7">path indentation</text>
  <text x="120" y="128" text-anchor="middle" font-size="11" fill="#534AB7">active file highlight</text>
  <text x="120" y="144" text-anchor="middle" font-size="11" fill="#534AB7">new / delete btns</text>

  <!-- left: action history -->
  <rect x="50" y="258" width="140" height="162" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="120" y="278" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Action history</text>
  <text x="120" y="298" text-anchor="middle" font-size="11" fill="#534AB7">snapshots table</text>
  <text x="120" y="314" text-anchor="middle" font-size="11" fill="#534AB7">labeled by tool call</text>
  <text x="120" y="330" text-anchor="middle" font-size="11" fill="#534AB7">diff preview on click</text>
  <text x="120" y="346" text-anchor="middle" font-size="11" fill="#534AB7">restore on confirm</text>

  <!-- center: tabs -->
  <rect x="204" y="56" width="300" height="24" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="260" y="68" text-anchor="middle" font-size="11" fill="#0F6E56">index.ts</text>
  <text x="354" y="68" text-anchor="middle" font-size="11" font-weight="500" fill="#085041">server.ts</text>

  <!-- center: monaco editor -->
  <rect x="204" y="80" width="300" height="220" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="354" y="102" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Monaco editor</text>
  <text x="354" y="120" text-anchor="middle" font-size="11" fill="#0F6E56">language server + autocomplete</text>
  <text x="354" y="138" text-anchor="middle" font-size="11" fill="#0F6E56">automaticLayout: true</text>
  <text x="354" y="156" text-anchor="middle" font-size="11" fill="#0F6E56">minimap: disabled</text>
  <text x="354" y="174" text-anchor="middle" font-size="11" fill="#0F6E56">fontSize: 13</text>

  <!-- ctrl+k pill inside editor -->
  <rect x="272" y="192" width="164" height="34" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="354" y="210" text-anchor="middle" font-size="12" font-weight="500" fill="#3C3489">Ctrl+K inline AI</text>

  <!-- center: output panel -->
  <rect x="204" y="314" width="300" height="106" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="354" y="334" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Output panel</text>
  <text x="354" y="352" text-anchor="middle" font-size="11" fill="#0F6E56">stdout / stderr — ansi-to-html</text>
  <text x="354" y="370" text-anchor="middle" font-size="11" fill="#0F6E56">auto-scroll on new output</text>
  <text x="354" y="388" text-anchor="middle" font-size="11" fill="#0F6E56">status dot: idle / running / ok / err</text>

  <!-- right: vibe chat -->
  <rect x="518" y="56" width="112" height="364" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="574" y="76" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">Vibe chat</text>
  <text x="574" y="96" text-anchor="middle" font-size="11" fill="#993C1D">SSE streaming</text>
  <text x="574" y="114" text-anchor="middle" font-size="11" fill="#993C1D">tool chips inline</text>
  <text x="574" y="132" text-anchor="middle" font-size="11" fill="#993C1D">history from DB</text>
  <text x="574" y="150" text-anchor="middle" font-size="11" fill="#993C1D">passes open file</text>

  <!-- column width labels -->
  <text x="120" y="452" text-anchor="middle" font-size="11" fill="#888780">220px</text>
  <text x="354" y="452" text-anchor="middle" font-size="11" fill="#888780">1fr (flex)</text>
  <text x="574" y="452" text-anchor="middle" font-size="11" fill="#888780">300px</text>

  <line x1="50" y1="444" x2="630" y2="444" stroke="#B4B2A9" stroke-width="0.5"/>
  <line x1="196" y1="438" x2="196" y2="450" stroke="#B4B2A9" stroke-width="0.5"/>
  <line x1="510" y1="438" x2="510" y2="450" stroke="#B4B2A9" stroke-width="0.5"/>
</svg>