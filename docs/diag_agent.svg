<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-coral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- user message -->
  <rect x="220" y="20" width="240" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="38" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">User message</text>
  <text x="340" y="54" text-anchor="middle" font-size="11" fill="#534AB7">+ current file path</text>

  <line x1="340" y1="64" x2="340" y2="94" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- build context -->
  <rect x="190" y="94" width="300" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="116" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Build context</text>
  <text x="340" y="136" text-anchor="middle" font-size="11" fill="#0F6E56">file tree (paths only) + open file content</text>

  <line x1="340" y1="150" x2="340" y2="180" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- LLM call -->
  <rect x="190" y="180" width="300" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="202" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">LLM call (streaming)</text>
  <text x="340" y="222" text-anchor="middle" font-size="11" fill="#993C1D">OpenRouter — Devstral 2 free</text>

  <!-- stream tokens left side -->
  <path d="M190 210 L120 210 L120 348 L158 348" fill="none" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr-coral)"/>
  <text x="80" y="272" text-anchor="middle" font-size="11" fill="#993C1D">tokens</text>
  <text x="80" y="286" text-anchor="middle" font-size="11" fill="#993C1D">stream</text>

  <line x1="340" y1="236" x2="340" y2="266" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- decision -->
  <rect x="205" y="266" width="270" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="284" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">Tool calls in response?</text>

  <!-- no → done -->
  <path d="M475 288 L560 288 L560 338 L510 338" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <text x="522" y="278" font-size="11" fill="#5F5E5A">no</text>
  <rect x="510" y="338" width="130" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="575" y="356" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Persist + close</text>
  <text x="575" y="372" text-anchor="middle" font-size="11" fill="#0F6E56">save to DB</text>

  <!-- yes → tools -->
  <line x1="340" y1="310" x2="340" y2="338" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <text x="356" y="328" font-size="11" fill="#5F5E5A">yes</text>

  <!-- execute tools -->
  <rect x="160" y="338" width="320" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="320" y="360" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">Execute tools</text>
  <text x="320" y="380" text-anchor="middle" font-size="11" fill="#854F0B">read_file / write_file / exec_command</text>

  <!-- tool events stream left -->
  <path d="M160 366 L120 366" fill="none" stroke="#854F0B" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="80" y="356" text-anchor="middle" font-size="11" fill="#854F0B">tool</text>
  <text x="80" y="370" text-anchor="middle" font-size="11" fill="#854F0B">events</text>

  <line x1="340" y1="394" x2="340" y2="424" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- append results -->
  <rect x="190" y="424" width="300" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="442" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Append tool results</text>
  <text x="340" y="458" text-anchor="middle" font-size="11" fill="#0F6E56">add to messages array</text>

  <!-- loop back arrow -->
  <path d="M190 446 L80 446 L80 202 L190 202" fill="none" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr-teal)"/>
  <text x="44" y="330" text-anchor="middle" font-size="11" fill="#0F6E56">loop</text>

  <!-- SSE client -->
  <rect x="36" y="314" width="106" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="89" y="332" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">SSE client</text>
  <text x="89" y="348" text-anchor="middle" font-size="11" fill="#534AB7">vibe chat UI</text>
</svg>