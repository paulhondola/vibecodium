<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#B4B2A9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- trigger: run button -->
  <rect x="80" y="20" width="180" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="170" y="38" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Run button</text>
  <text x="170" y="54" text-anchor="middle" font-size="11" fill="#534AB7">user triggered</text>

  <!-- trigger: agent tool -->
  <rect x="420" y="20" width="180" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="510" y="38" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">Agent tool</text>
  <text x="510" y="54" text-anchor="middle" font-size="11" fill="#993C1D">exec_command</text>

  <line x1="200" y1="64" x2="290" y2="104" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="480" y1="64" x2="390" y2="104" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- POST /execute -->
  <rect x="190" y="104" width="300" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="126" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">POST /execute</text>
  <text x="340" y="146" text-anchor="middle" font-size="11" fill="#0F6E56">fetch files from DB → build file map</text>

  <line x1="340" y1="160" x2="340" y2="194" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- execution router -->
  <rect x="180" y="194" width="320" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="216" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">Execution router</text>
  <text x="340" y="236" text-anchor="middle" font-size="11" fill="#854F0B">JS/TS → Bun.spawn   |   other → Piston</text>

  <line x1="260" y1="250" x2="180" y2="290" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="420" y1="250" x2="500" y2="290" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Bun engine -->
  <rect x="40" y="290" width="250" height="70" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="165" y="312" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">Bun.spawn</text>
  <text x="165" y="330" text-anchor="middle" font-size="11" fill="#5F5E5A">write files to /tmp/uuid/</text>
  <text x="165" y="347" text-anchor="middle" font-size="11" fill="#5F5E5A">run, capture stdout, clean up</text>

  <!-- Piston engine -->
  <rect x="390" y="290" width="250" height="70" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="515" y="312" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">Piston API</text>
  <text x="515" y="330" text-anchor="middle" font-size="11" fill="#5F5E5A">serialize files array</text>
  <text x="515" y="347" text-anchor="middle" font-size="11" fill="#5F5E5A">POST emkc.org/api/v2/piston</text>

  <!-- fallback dashed -->
  <path d="M390 320 L330 320 L330 305 L290 305" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr-gray)"/>
  <text x="340" y="296" text-anchor="middle" font-size="10" fill="#888780">fallback if Piston down</text>

  <!-- result merge -->
  <line x1="165" y1="360" x2="260" y2="388" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="515" y1="360" x2="420" y2="388" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="200" y="380" width="280" height="10" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="376" text-anchor="middle" font-size="11" fill="#0F6E56">{ stdout, stderr, exitCode }</text>
</svg>